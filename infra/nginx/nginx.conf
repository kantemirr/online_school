# Обратный прокси: /api → backend, всё остальное → frontend (Vite dev-server).
#
# resolver 127.0.0.11 — встроенный DNS Docker. Адреса upstream'ов разрешаются
# в рантайме (через переменные), поэтому пересборка backend/frontend (смена IP)
# не требует перезапуска nginx.
server {
    listen 80;
    server_name _;

    resolver 127.0.0.11 valid=10s ipv6=off;
    client_max_body_size 20m;

    # API
    location /api/ {
        set $upstream_api backend;
        proxy_pass http://$upstream_api:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Документация API (Swagger UI / ReDoc)
    location ~ ^/(docs|redoc) {
        set $upstream_docs backend;
        proxy_pass http://$upstream_docs:8000$request_uri;
        proxy_set_header Host $host;
    }

    # Frontend (SPA) + HMR websocket
    location / {
        set $upstream_front frontend;
        proxy_pass http://$upstream_front:5173$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
