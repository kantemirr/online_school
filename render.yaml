# Render Blueprint — бэкенд CodeKids на БЕСПЛАТНОМ тарифе (один web-сервис).
# Воркер ARQ запускается ВНУТРИ web-сервиса (scripts/start.sh), т.к. отдельный
# worker-сервис и preDeployCommand на Render платные.
# Postgres и Redis — бесплатные на Vercel Marketplace (Neon + Upstash),
# подключаются через DATABASE_DSN / REDIS_DSN. Создать: Render → New → Blueprint.
#
# ОГРАНИЧЕНИЯ free-тарифа: сервис засыпает после ~15 мин простоя (первый запрос
# «холодный»); Render не даёт доступ к Docker-сокету → песочница (исполнение кода)
# деградирует (понятное «недоступно»); полноценная изоляция — локально.

envVarGroups:
  - name: codekids-shared
    envVars:
      - key: DATABASE_DSN        # postgres://… от Vercel Postgres (non-pooling)
        sync: false
      - key: REDIS_DSN           # rediss://… от Vercel KV (Upstash)
        sync: false
      - key: DB_SSL
        value: "true"
      - key: ANTHROPIC_API_KEY   # опц. (иначе эвристические подсказки)
        sync: false

services:
  - type: web
    name: codekids-backend
    runtime: docker
    plan: free
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    healthCheckPath: /api/v1/health
    # Миграции+сиды и воркер запускаются внутри start.sh (без платного preDeploy/worker)
    startCommand: bash scripts/start.sh
    envVars:
      - fromGroup: codekids-shared
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS        # домен фронта на Vercel, напр. https://codekids.vercel.app
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: admin@codekids.ru
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
